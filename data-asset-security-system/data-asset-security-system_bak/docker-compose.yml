version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: data-asset-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: data_asset_security
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - data-asset-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: data-asset-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - data-asset-network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: data-asset-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - data-asset-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: data-asset-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - data-asset-network

volumes:
  mysql-data:
  redis-data:
  es-data:
  rabbitmq-data:

networks:
  data-asset-network:
    driver: bridge
